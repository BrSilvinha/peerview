<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #ef4444;
      border-radius: 50%;
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }

    input:focus {
      border-color: #ef4444;
    }

    input::placeholder {
      color: #475569;
    }

    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    #btn-connect {
      background: #ef4444;
      color: #fff;
    }

    #btn-disconnect {
      background: #334155;
      color: #cbd5e1;
      display: none;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
    }

    .dot.connected { background: #22c55e; }
    .dot.connecting { background: #f59e0b; }
    .dot.error { background: #ef4444; }

    #error-msg {
      margin-top: 8px;
      font-size: 11px;
      color: #ef4444;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>PeerView</h1>
  </div>

  <label for="token-input">Enlace o token de sesion</label>
  <input
    id="token-input"
    type="text"
    placeholder="Pega el link o el token"
    autocomplete="off"
    spellcheck="false"
  />

  <button id="btn-connect">Conectar</button>
  <button id="btn-disconnect">Desconectar</button>

  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Sin conectar</span>
  </div>

  <div id="error-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
